root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/server"
  cmd = "go build -o ./tmp/server ."
  delay = 500
  exclude_dir = ["tmp", "bin", "node_modules", "e2e", "logs", "playwright-report", "test-results"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "html"]
  kill_delay = 500

[log]
  time = false

[misc]
  clean_on_exit = true
