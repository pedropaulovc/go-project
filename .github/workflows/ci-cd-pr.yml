name: CI - Pull Request

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: go vet ./...
      - run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - run: go tool cover -func=coverage.out
      - name: Enforce minimum coverage (70%)
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$3); print $3}')
          awk -v total="$total" 'BEGIN {
            if (total + 0 < 70) {
              printf("Coverage %.1f%% is below required 70%%\n", total + 0)
              exit 1
            }
          }'
      - name: Generate coverage JSON
        run: |
          go tool cover -func=coverage.out | tail -1 | awk '{print "{\"total\": \"" $3 "\"}"}' > coverage-summary.json
      - name: Download baseline
        uses: dawidd6/action-download-artifact@v21
        with:
          name: coverage-baseline
          workflow: ci-cd-main.yml
          branch: main
          if_no_artifact_found: warn
          path: baseline/
      - name: Report coverage delta
        run: |
          current=$(cat coverage-summary.json | grep -o '[0-9.]*')
          if [ -f baseline/coverage-summary.json ]; then
            baseline=$(cat baseline/coverage-summary.json | grep -o '[0-9.]*')
            echo "## Coverage: ${current}% (baseline: ${baseline}%)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Coverage: ${current}% (no baseline yet)" >> "$GITHUB_STEP_SUMMARY"
          fi

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: go build ./cmd/myapp
