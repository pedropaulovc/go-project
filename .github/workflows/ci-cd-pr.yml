name: CI - Pull Request

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.1.6

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
      - run: go vet ./...
      - run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - run: go tool cover -func=coverage.out
      - name: Generate coverage JSON
        run: |
          go tool cover -func=coverage.out | tail -1 | awk '{print "{\"total\": \"" $3 "\"}"}' > coverage-summary.json
      - name: Download baseline
        uses: dawidd6/action-download-artifact@v6
        with:
          name: coverage-baseline
          workflow: ci-cd-main.yml
          branch: main
          if_no_artifact_found: warn
          path: baseline/
      - name: Report coverage delta
        run: |
          current=$(cat coverage-summary.json | grep -o '[0-9.]*')
          if [ -f baseline/coverage-summary.json ]; then
            baseline=$(cat baseline/coverage-summary.json | grep -o '[0-9.]*')
            echo "## Coverage: ${current}% (baseline: ${baseline}%)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Coverage: ${current}% (no baseline yet)" >> "$GITHUB_STEP_SUMMARY"
          fi

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test
        env:
          CI: true
